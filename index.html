<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fastest Vertical Kilometer Finder</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 40px auto;
    padding: 20px;
}
#results {
    margin-top: 20px;
    padding: 15px;
    background: #f3f3f3;
    border-radius: 8px;
}
#map {
    height: 450px;
    margin-top: 25px;
    border-radius: 8px;
}
canvas {
    margin-top: 25px;
}
</style>
</head>
<body>

<h1>Fastest Vertical Kilometer Finder</h1>

<input type="file" id="fileInput" accept=".gpx">

<div id="results"></div>

<div id="map"></div>

<canvas id="elevationChart"></canvas>

<script>

let chart;
let map;
let routeLayer;

document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const text = await file.text();
    processGPX(text);
});

function processGPX(gpxText) {

    const parser = new DOMParser();
    const xml = parser.parseFromString(gpxText, "application/xml");

    const trkpts = xml.getElementsByTagName("trkpt");

    const points = [];

    for (let i = 0; i < trkpts.length; i++) {

        const pt = trkpts[i];

        const eleNode = pt.getElementsByTagName("ele")[0];
        const timeNode = pt.getElementsByTagName("time")[0];

        if (!eleNode || !timeNode) continue;

        points.push({
            lat: parseFloat(pt.getAttribute("lat")),
            lon: parseFloat(pt.getAttribute("lon")),
            ele: parseFloat(eleNode.textContent),
            time: new Date(timeNode.textContent)
        });
    }

    if (points.length < 2) {
        alert("Not enough track points.");
        return;
    }

    findFastestVK(points);
}

function findFastestVK(points) {

    const n = points.length;
    const cumulativeAscent = new Array(n).fill(0);

    for (let i = 1; i < n; i++) {
        const gain = points[i].ele - points[i - 1].ele;

        cumulativeAscent[i] =
            cumulativeAscent[i - 1] +
            (gain > 3 ? gain : 0);
    }

    let start = 0;
    let best = null;

    for (let end = 0; end < n; end++) {

        while (cumulativeAscent[end] - cumulativeAscent[start] >= 1000) {

            const duration =
                points[end].time - points[start].time;

            if (!best || duration < best.duration) {
                best = { start, end, duration };
            }

            start++;
        }
    }

    if (!best) {
        document.getElementById("results").innerHTML =
            "<h2>Activity does not contain 1000m cumulative ascent.</h2>";
        return;
    }

    displayResults(points, best);
}

function displayResults(points, best) {

    const segment = points.slice(best.start, best.end + 1);

    const hours = best.duration / 1000 / 60 / 60;

    const distance = computeDistance(segment);
    const climbRate = 1000 / hours;

    document.getElementById("results").innerHTML = `
        <h2>Fastest Vertical Kilometer</h2>
        <p><strong>Time:</strong> ${formatDuration(best.duration)}</p>
        <p><strong>Start:</strong> ${segment[0].time.toLocaleString()}</p>
        <p><strong>Finish:</strong> ${segment[segment.length - 1].time.toLocaleString()}</p>
        <p><strong>Distance:</strong> ${distance.toFixed(2)} km</p>
        <p><strong>Climbing Rate:</strong> ${climbRate.toFixed(0)} m/hr</p>
    `;

    drawChart(segment);
    drawMap(segment);
}

function drawMap(segment) {

    const coords = segment.map(p => [p.lat, p.lon]);

    if (!map) {
        map = L.map('map');
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            { attribution: '&copy; OpenStreetMap contributors' }
        ).addTo(map);
    }

    if (routeLayer) {
        routeLayer.remove();
    }

    routeLayer = L.featureGroup().addTo(map);

    const line = L.polyline(coords).addTo(routeLayer);

    L.marker(coords[0])
        .bindPopup("VK Start")
        .addTo(routeLayer);

    L.marker(coords[coords.length - 1])
        .bindPopup("VK Finish")
        .addTo(routeLayer);

    map.fitBounds(line.getBounds(), { padding: [20, 20] });
}

function drawChart(segment) {

    const elevations = segment.map(p => p.ele);

    if (chart) chart.destroy();

    chart = new Chart(
        document.getElementById('elevationChart'),
        {
            type: 'line',
            data: {
                labels: elevations.map((_, i) => i),
                datasets: [{
                    label: 'Elevation (m)',
                    data: elevations
                }]
            },
            options: {
                responsive: true
            }
        }
    );
}

function formatDuration(ms) {

    const totalSeconds = Math.floor(ms / 1000);

    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;

    return `${h}h ${m}m ${s}s`;
}

function computeDistance(points) {

    let distance = 0;

    for (let i = 1; i < points.length; i++) {
        distance += haversine(
            points[i - 1].lat,
            points[i - 1].lon,
            points[i].lat,
            points[i].lon
        );
    }

    return distance;
}

function haversine(lat1, lon1, lat2, lon2) {

    const R = 6371;

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) ** 2;

    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}
</script>

</body>
</html>
